version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "5173:5173"
    depends_on:
      - backend